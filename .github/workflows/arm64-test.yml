name: ARM64 Pipeline Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  arm64-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs wget unzip file python3-pip

      - name: Verify ARM64 architecture
        run: |
          echo "=== Architecture ==="
          uname -m
          echo "=== ptrace test ==="
          python3 -c "
          import os, ctypes
          pid = os.fork()
          if pid == 0:
              import time; time.sleep(2); os._exit(0)
          else:
              libc = ctypes.CDLL('libc.so.6', use_errno=True)
              r = libc.ptrace(16, pid, 0, 0)
              print('ptrace: ' + ('ALLOWED' if r == 0 else 'BLOCKED'))
              os.waitpid(pid, 0)
          "

      # ── Step 1: Get Android Bionic libraries ──────────────────────
      - name: Set up Bionic libraries
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          sudo mkdir -p /system/bin /system/lib64

          # Strategy 1: Download NDK for Bionic runtime libs (libc.so, libm.so, etc.)
          echo "Downloading Android NDK r27c..."
          wget -q "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip" -O /tmp/ndk.zip
          echo "NDK size: $(du -h /tmp/ndk.zip | cut -f1)"
          cd /tmp
          unzip -q ndk.zip -d ndk_extracted/ 2>/dev/null

          # Extract Bionic runtime libs from NDK (these are real, not stubs)
          for lib in libc.so libm.so libdl.so liblog.so libdl_android.so; do
            FOUND=$(find ndk_extracted/ -name "$lib" -path "*/aarch64*" -type f -size +1k 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              sudo cp "$FOUND" /system/lib64/ 2>/dev/null
              echo "  NDK: $lib ($(stat -c%s "$FOUND") bytes)"
            fi
          done

          # Search for linker64 in NDK (check ALL sizes, not just >1k)
          echo "=== Searching for linker64 in NDK ==="
          find ndk_extracted/ -name "linker64" 2>/dev/null
          find ndk_extracted/ -name "linker*" 2>/dev/null | head -20

          # Also list ALL files in the aarch64 sysroot lib directory
          echo "=== NDK aarch64 sysroot lib contents ==="
          find ndk_extracted/ -path "*/aarch64-linux-android*" -name "*.so" -o -path "*/aarch64-linux-android*" -name "linker*" 2>/dev/null | head -30

          LINKER=$(find ndk_extracted/ -name "linker64" 2>/dev/null | head -1)
          if [ -n "$LINKER" ]; then
            echo "Found linker64: $LINKER ($(stat -c%s "$LINKER") bytes)"
            sudo cp "$LINKER" /system/bin/linker64
            sudo chmod +x /system/bin/linker64
            file /system/bin/linker64
          fi

          # Strategy 2: If linker64 not in NDK, extract from system image via Python ext4
          if [ ! -f /system/bin/linker64 ]; then
            echo "linker64 not in NDK, extracting from system image..."
            cd $GITHUB_WORKSPACE

            # Download system image
            wget -q "https://dl.google.com/android/repository/sys-img/aosp_atd/arm64-v8a-35_r01.zip" -O /tmp/system-image.zip
            cd /tmp
            unzip -q system-image.zip "arm64-v8a/system.img" -d .

            # Check image format and convert sparse to raw
            echo "=== Checking image format ==="
            python3 $GITHUB_WORKSPACE/scripts/simg2raw.py arm64-v8a/system.img system.raw
            echo "Raw image size: $(du -h system.raw | cut -f1)"

            # The system image is a "super partition" with metadata before the ext4.
            # Find the ext4 filesystem offset by searching for the superblock magic.
            EXT4_OFFSET=$(python3 $GITHUB_WORKSPACE/scripts/find_ext4_offset.py system.raw)
            echo "ext4 offset: $EXT4_OFFSET"

            # Install ext4 Python module
            pip3 install ext4 2>/dev/null

            # Try multiple extraction strategies:

            # Strategy A: Mount at ext4 offset using loop
            echo "=== Strategy A: Mount at ext4 offset ==="
            if [ -n "$EXT4_OFFSET" ]; then
              sudo mkdir -p /mnt/system
              sudo mount -o loop,ro,offset=$EXT4_OFFSET system.raw /mnt/system 2>&1 && {
                echo "Mount at offset $EXT4_OFFSET succeeded!"
                ls /mnt/system/ | head -10
              } || {
                echo "Mount at offset failed, trying losetup..."
                # Create a loop device at the offset
                LOOPDEV=$(sudo losetup -f --show -o $EXT4_OFFSET system.raw 2>/dev/null)
                if [ -n "$LOOPDEV" ]; then
                  echo "Loop device: $LOOPDEV"
                  sudo mount -o ro "$LOOPDEV" /mnt/system 2>&1 && echo "losetup mount succeeded!" || echo "losetup mount failed"
                fi
              }

              if mountpoint -q /mnt/system 2>/dev/null; then
                # Extract Bionic bootstrap libs
                BOOTSTRAP="/mnt/system/system/lib64/bootstrap"
                if [ -d "$BOOTSTRAP" ]; then
                  echo "Found bootstrap directory"
                  for lib in libc.so libm.so libdl.so libdl_android.so; do
                    if [ -f "$BOOTSTRAP/$lib" ]; then
                      sudo cp "$BOOTSTRAP/$lib" /system/lib64/
                      echo "  bootstrap: $lib ($(stat -c%s "$BOOTSTRAP/$lib") bytes)"
                    fi
                  done
                fi

                # Extract linker64 from APEX
                APEX="/mnt/system/system/apex/com.android.runtime.apex"
                if [ -f "$APEX" ]; then
                  echo "Found APEX: $APEX"
                  sudo cp "$APEX" /tmp/runtime.apex
                  cd /tmp
                  rm -rf apex_dir/
                  unzip -q runtime.apex -d apex_dir/ 2>/dev/null
                  if [ -f apex_dir/apex_payload.img ]; then
                    echo "Mounting APEX payload..."
                    sudo mkdir -p /mnt/apex
                    sudo mount -o loop,ro apex_dir/apex_payload.img /mnt/apex 2>&1
                    if [ -f /mnt/apex/bin/linker64 ]; then
                      sudo cp /mnt/apex/bin/linker64 /system/bin/linker64
                      sudo chmod +x /system/bin/linker64
                      echo "  APEX: linker64 ($(stat -c%s /mnt/apex/bin/linker64) bytes)"
                      file /system/bin/linker64
                    fi
                    for lib in /mnt/apex/lib64/bionic/*.so; do
                      [ -f "$lib" ] && sudo cp "$lib" /system/lib64/ 2>/dev/null && echo "  APEX: $(basename $lib)"
                    done
                    sudo umount /mnt/apex 2>/dev/null
                  fi
                  cd -
                fi
                sudo umount /mnt/system 2>/dev/null
              fi
            fi

            # Strategy B: Python ext4 module (fallback if mount failed)
            if [ ! -f /system/bin/linker64 ] && [ -n "$EXT4_OFFSET" ]; then
              echo "=== Strategy B: Python ext4 at offset ==="
              # Extract just the ext4 portion to a separate file
              dd if=system.raw of=system.ext4 bs=1 skip=$EXT4_OFFSET count=877170688 2>/dev/null
              python3 $GITHUB_WORKSPACE/scripts/extract_bionic.py system.ext4 /tmp/bionic_out 2>&1 || true

              if [ -f /tmp/bionic_out/linker64 ]; then
                sudo cp /tmp/bionic_out/linker64 /system/bin/linker64
                sudo chmod +x /system/bin/linker64
                echo "  Python: linker64 ($(stat -c%s /tmp/bionic_out/linker64) bytes)"
              fi
              for lib in /tmp/bionic_out/*.so; do
                [ -f "$lib" ] && [ $(stat -c%s "$lib") -gt 1000 ] && sudo cp "$lib" /system/lib64/ 2>/dev/null && echo "  Python: $(basename $lib)"
              done
            fi
          fi

          cd $GITHUB_WORKSPACE

          # Verify
          echo ""
          echo "=== Bionic setup verification ==="
          ls -la /system/bin/linker64 2>&1
          file /system/bin/linker64 2>&1
          echo "=== /system/lib64 contents ==="
          ls -la /system/lib64/ 2>&1
          exit 0

      # ── Step 2: Set up Termux rootfs ──────────────────────────────
      - name: Extract Termux bootstrap
        run: |
          mkdir -p rootfs/data/data/com.termux/files/usr
          unzip -q app/src/main/assets/termux-bootstrap.zip \
            -d rootfs/data/data/com.termux/files/usr/

          cd rootfs/data/data/com.termux/files/usr
          count=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            target=$(echo "$line" | sed 's/←.*//' | sed 's/^\.\///')
            linkname=$(echo "$line" | sed 's/.*←//' | sed 's/^\.\///')
            dir=$(dirname "$linkname")
            mkdir -p "$dir"
            ln -sf "$target" "$linkname" 2>/dev/null && count=$((count+1)) || true
          done < SYMLINKS.txt
          echo "Created $count symlinks"
          cd -

          mkdir -p rootfs/data/data/com.termux/files/home
          mkdir -p rootfs/data/data/com.termux/files/usr/tmp
          mkdir -p rootfs/data/data/com.termux/cache/apt/archives/partial
          mkdir -p rootfs/etc
          # Create resolv.conf with real DNS servers (not systemd-resolved stub)
          echo "nameserver 8.8.8.8" > rootfs/etc/resolv.conf
          echo "nameserver 1.1.1.1" >> rootfs/etc/resolv.conf
          # Also copy to /system/etc/ since Bionic's resolver may look there
          mkdir -p rootfs/system/etc
          cp rootfs/etc/resolv.conf rootfs/system/etc/resolv.conf
          # Bionic's DNS resolver doesn't use /etc/resolv.conf like glibc — it
          # uses Android's netd daemon which isn't available in PRoot.
          # Workaround: resolve packages.termux.dev on the host (IPv4 only)
          # and add it to /etc/hosts inside the rootfs.
          TERMUX_IP=$(curl -s -o /dev/null -w '%{remote_ip}' https://packages.termux.dev/ 2>/dev/null || getent ahostsv4 packages.termux.dev 2>/dev/null | head -1 | awk '{print $1}')
          echo "Resolved packages.termux.dev to: $TERMUX_IP"
          # Always write to /etc/hosts, even if empty (at least the file exists)
          echo "# hosts file for PRoot" > rootfs/etc/hosts
          if [ -n "$TERMUX_IP" ]; then
            echo "$TERMUX_IP packages.termux.dev" >> rootfs/etc/hosts
            cp rootfs/etc/hosts rootfs/system/etc/hosts 2>/dev/null
          fi
          # Also resolve registry.npmjs.org for npm install later
          NPM_IP=$(curl -s -o /dev/null -w '%{remote_ip}' https://registry.npmjs.org/ 2>/dev/null)
          echo "Resolved registry.npmjs.org to: $NPM_IP"
          if [ -n "$NPM_IP" ]; then
            echo "$NPM_IP registry.npmjs.org" >> rootfs/etc/hosts
            cp rootfs/etc/hosts rootfs/system/etc/hosts 2>/dev/null
          fi
          echo "=== resolv.conf contents ==="
          cat rootfs/etc/resolv.conf
          echo "=== hosts contents ==="
          cat rootfs/etc/hosts
          mkdir -p rootfs/data/data/com.termux/files/usr/etc/apt
          echo "deb https://packages.termux.dev/apt/termux-main/ stable main" \
            > rootfs/data/data/com.termux/files/usr/etc/apt/sources.list

          echo "=== Rootfs verification ==="
          ls -la rootfs/data/data/com.termux/files/usr/bin/sh
          ls -la rootfs/data/data/com.termux/files/usr/bin/bash

      # ── Step 3: Test the full pipeline ────────────────────────────
      - name: Test 1 - Basic PRoot execution
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          chmod +x app/src/main/jniLibs/arm64-v8a/libproot.so
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          echo "=== Test: echo hello via PRoot ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c "echo 'Hello from PRoot on ARM64!'; echo '=== DNS test ==='; cat /etc/resolv.conf; getent hosts packages.termux.dev 2>&1 || echo 'getent failed'; ping -c1 -W2 packages.termux.dev 2>&1 || echo 'ping failed'"
          echo "EXIT=$?"

      - name: Test 2 - dpkg --configure -a
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c "dpkg --configure -a 2>&1 || true"
          echo "EXIT=$?"

      - name: Test 3 - apt update
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "apt update -o APT::Sandbox::User=root 2>&1"
          echo "EXIT=$?"

      - name: Test 4 - Install tools from offline debs (like the app does)
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          # Download offline .deb files directly from packages.termux.dev
          # (They're gitignored so won't be in the checkout)
          echo "=== Downloading offline debs ==="
          mkdir -p rootfs/offline-debs
          if [ -d app/src/openclaude/assets/offline-debs ] && ls app/src/openclaude/assets/offline-debs/*.deb >/dev/null 2>&1; then
            cp app/src/openclaude/assets/offline-debs/*.deb rootfs/offline-debs/
            echo "Copied $(ls rootfs/offline-debs/*.deb 2>/dev/null | wc -l) debs from assets"
          else
            echo "No debs in assets, downloading from packages.termux.dev..."
            python3 scripts/download-offline-packages.py rootfs/offline-debs
            echo "Downloaded $(ls rootfs/offline-debs/*.deb 2>/dev/null | wc -l) debs"
          fi

          echo "=== Installing debs via dpkg -i ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "dpkg -i /offline-debs/*.deb 2>&1; echo DPKG_EXIT=\$?"
          echo "EXIT=$?"

          echo "=== Configure packages ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "dpkg --configure -a 2>&1; echo CONFIGURE_EXIT=\$?"

          echo "=== Tool verification ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "node --version && npm --version && git --version"

      - name: Test 5 - Diagnose + npm install
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          echo "=== STEP 1: ROOT CAUSE DIAGNOSTICS ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c '
              echo "--- ls node/npm ---"
              ls -la $PREFIX/bin/node $PREFIX/bin/npm 2>&1
              echo "--- file node ---"
              file $PREFIX/bin/node 2>&1
              echo "--- npm shebang ---"
              head -1 $PREFIX/bin/npm 2>&1
              echo "--- node version (direct) ---"
              $PREFIX/bin/node --version 2>&1
              echo "--- which env ---"
              ls -la /usr/bin/env 2>&1 || echo "/usr/bin/env NOT FOUND"
              ls -la $PREFIX/bin/env 2>&1 || echo "$PREFIX/bin/env NOT FOUND"
              echo "--- dpkg status ---"
              dpkg -s nodejs 2>&1 | head -5
              dpkg -s npm 2>&1 | head -5
              echo "--- PATH ---"
              echo $PATH
            '

          echo ""
          echo "=== STEP 2: /usr/bin/env symlink (harmless, kept for diagnostics) ==="
          # Originally hypothesized that #!/usr/bin/env node shebangs fail because
          # /usr/bin/env doesn't exist in Termux. CI diagnostics proved this WRONG —
          # the real issue was that node/npm were never installed (debs not downloaded).
          # The symlink is harmless (npm works via PATH without it) but kept for
          # future diagnostics in case on-device behavior differs.
          mkdir -p rootfs/usr/bin
          ln -sf /data/data/com.termux/files/usr/bin/env rootfs/usr/bin/env 2>/dev/null || true
          echo "Created /usr/bin/env -> $PREFIX/bin/env (diagnostic, not required)"

          echo ""
          echo "=== STEP 3: Re-test after fix ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c '
              echo "--- npm version (via shebang) ---"
              npm --version 2>&1
              echo "NPM_EXIT=$?"
              echo "--- node version ---"
              node --version 2>&1
              echo "--- npm install -g ---"
              npm install -g @gitlawb/openclaude 2>&1
              echo "INSTALL_EXIT=$?"
            '
          echo "EXIT=$?"

      - name: Test 6 - Agent entry point resolution
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          echo "=== Check if openclaude binary exists ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "which openclaude 2>/dev/null || echo 'NOT IN PATH'"

          echo "=== Try executing openclaude directly ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "openclaude --version 2>&1 || echo 'EXEC FAILED'"

          echo "=== Resolve symlink ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "readlink -f \$PREFIX/bin/openclaude 2>/dev/null || echo 'SYMLINK FAILED'"

          echo "=== Try node with resolved path ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "RESOLVED=\$(readlink -f \$PREFIX/bin/openclaude) && node \"\$RESOLVED\" --version 2>&1 || echo 'NODE EXEC FAILED'"

      - name: Test 7 - Agent prompt execution (with /usr/bin/env fix)
        run: |
          set +e
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=/data/data/com.termux/files/usr/bin:/system/bin:/usr/bin
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=/tmp
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          # Ensure /usr/bin/env symlink exists (created in Test 5)
          mkdir -p rootfs/usr/bin
          ln -sf /data/data/com.termux/files/usr/bin/env rootfs/usr/bin/env 2>/dev/null || true

          echo "=== openclaude shebang ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            'head -1 $PREFIX/bin/openclaude 2>/dev/null || echo "openclaude not installed (npm install may have failed)"'

          echo "=== Try openclaude directly (with /usr/bin/env fix) ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            'openclaude --version 2>&1; echo "DIRECT_EXIT=$?"'

          echo "=== Try node with resolved path ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            'RESOLVED=$(readlink -f $PREFIX/bin/openclaude 2>/dev/null) && echo "Resolved: $RESOLVED" && node "$RESOLVED" --version 2>&1; echo "NODE_EXIT=$?"'

      - name: Summary
        if: always()
        run: |
          echo "========================================="
          echo "ARM64 Pipeline Test Summary"
          echo "========================================="
          echo "Architecture: $(uname -m)"
          echo ""
          echo "If any test above shows EXIT=0, that step passed."
          echo "If tests failed, check the logs above for the exact error."
          echo "========================================="
