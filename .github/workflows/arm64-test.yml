name: ARM64 Pipeline Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  arm64-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs wget unzip file

      - name: Verify ARM64 architecture
        run: |
          echo "=== Architecture ==="
          uname -m
          echo "=== ptrace test ==="
          python3 -c "
          import os, ctypes
          pid = os.fork()
          if pid == 0:
              import time; time.sleep(2); os._exit(0)
          else:
              libc = ctypes.CDLL('libc.so.6', use_errno=True)
              r = libc.ptrace(16, pid, 0, 0)
              print('ptrace: ' + ('ALLOWED' if r == 0 else 'BLOCKED'))
              os.waitpid(pid, 0)
          "

      # ── Step 1: Get Android Bionic libraries ──────────────────────
      # The Termux binaries are ARM64 ELF files that need /system/bin/linker64
      # (Android's Bionic dynamic linker) and /system/lib64/libc.so.
      # These only exist on Android devices or in Android system images.
      # We download the AOSP ATD system image and extract the real Bionic libs.
      - name: Download pre-extracted Android Bionic libraries
        run: |
          set +e  # Don't exit on individual command failures
          sudo mkdir -p /system/bin /system/lib64

          # The Android system image uses ext4 features that debugfs can't read.
          # Instead, download pre-extracted Bionic libraries from the Termux
          # project's CI artifacts. These are the real ARM64 Bionic runtime
          # libraries extracted from AOSP.
          #
          # Source: https://github.com/termux/termux-packages
          # The termux-elf-cleaner and termux-exec packages include Bionic.
          
          # Strategy: Download the Termux packages that contain Bionic libs
          # The 'ndk-sysroot' package includes the Bionic runtime libraries
          echo "Downloading ndk-sysroot package (contains Bionic stubs)..."
          wget -q "https://packages.termux.dev/apt/termux-main/pool/main/n/ndk-sysroot/ndk-sysroot_29-2_aarch64.deb" -O /tmp/ndk-sysroot.deb
          
          # Extract the .deb
          cd /tmp
          ar x ndk-sysroot.deb
          tar xf data.tar.xz 2>/dev/null
          
          # Check what we got
          echo "=== ndk-sysroot contents ==="
          find data/ -name "linker64" -o -name "libc.so" -o -name "libm.so" 2>/dev/null | head -10
          
          # The ndk-sysroot only has stub libs. We need the real runtime libs.
          # Let's try a different approach: download the Android NDK directly
          # and extract the Bionic runtime from there.
          # The NDK includes real Bionic libs at:
          # toolchains/llvm/prebuilt/linux-aarch64/sysroot/usr/lib/aarch64-linux-android/
          
          echo ""
          echo "Downloading Android NDK r27c (x86_64 host, contains aarch64 targets)..."
          wget -q "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip" -O /tmp/ndk.zip
          echo "NDK downloaded: $(du -h /tmp/ndk.zip | cut -f1)"
          cd /tmp
          unzip -q ndk.zip -d ndk_extracted/ 2>/dev/null

          # Search for linker64 — it's in the sysroot at various API levels
          echo "=== Searching for linker64 in NDK ==="
          find ndk_extracted/ -name "linker64" 2>/dev/null

          # The NDK has linker64 at:
          # toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/<api>/linker64
          LINKER=$(find ndk_extracted/ -name "linker64" -type f 2>/dev/null | head -1)
          if [ -n "$LINKER" ]; then
            echo "Found linker64: $LINKER ($(stat -c%s "$LINKER") bytes)"
            sudo cp "$LINKER" /system/bin/linker64
            sudo chmod +x /system/bin/linker64
            file /system/bin/linker64
          else
            echo "linker64 not found in NDK."
            echo "Trying to extract from Android system image using Python ext4 module..."

            # Download the system image and extract linker64 using Python
            # (debugfs can't read the ext4, but Python's ext4 module can)
            cd $GITHUB_WORKSPACE
            wget -q "https://dl.google.com/android/repository/sys-img/aosp_atd/arm64-v8a-35_r01.zip" -O /tmp/system-image.zip
            cd /tmp
            unzip -q system-image.zip "arm64-v8a/system.img" -d .
            simg2img arm64-v8a/system.img system.raw 2>/dev/null || cp arm64-v8a/system.img system.raw

            # Install ext4 Python module
            pip3 install ext4 2>/dev/null

            # Extract linker64 from the APEX inside the system image
            python3 << 'PYEOF'
import os, struct

# Find the ext4 filesystem offset in the system image
# (the system image has a header before the actual ext4 data)
FS_OFFSET = None
with open('/tmp/system.raw', 'rb') as f:
    # Search for ext4 magic (0x53EF) in the first 100MB
    offset = 0
    while offset < 100 * 1024 * 1024:
        f.seek(offset)
        data = f.read(1024)
        if len(data) < 58:
            break
        # ext4 superblock magic is at offset 56 within the superblock
        # The superblock starts at offset 1024 within the partition
        for i in range(0, len(data) - 58, 4):
            if data[i+56:i+58] == b'\x53\xef':
                sb_start = offset + i - 56
                if sb_start >= 0:
                    FS_OFFSET = sb_start - 1024
                    print(f"Found ext4 superblock at offset {sb_start}, FS starts at {FS_OFFSET}")
                    break
        if FS_OFFSET is not None:
            break
        offset += 1024

if FS_OFFSET is None:
    print("ERROR: Could not find ext4 filesystem in system image")
    exit(1)

# Extract the ext4 filesystem to a separate file
fs_size = 214153 * 4096  # from earlier analysis
print(f"Extracting ext4 filesystem ({fs_size} bytes) from offset {FS_OFFSET}...")
with open('/tmp/system.raw', 'rb') as src:
    src.seek(FS_OFFSET)
    with open('/tmp/system.ext4', 'wb') as dst:
        remaining = fs_size
        while remaining > 0:
            chunk = src.read(min(1024*1024, remaining))
            if not chunk:
                break
            dst.write(chunk)
            remaining -= len(chunk)

# Now use the ext4 module to read it
from ext4 import Volume

with open('/tmp/system.ext4', 'rb') as f:
    vol = Volume(f)
    root = vol.root

    def get_dir(parent, name):
        for entry, filetype in parent.opendir():
            n = entry.name
            if isinstance(n, bytes):
                n = n.decode('utf-8', errors='replace')
            if n == name:
                return vol.inodes[entry.inode]
        return None

    def extract_file(inode, output_path):
        os.makedirs(os.path.dirname(output_path), exist_ok=True)
        bio = inode.open()
        data = bio.read(inode.size)
        with open(output_path, 'wb') as out:
            out.write(data)
        print(f"  Extracted: {output_path} ({len(data)} bytes)")
        return len(data)

    # Navigate to /system/lib64/bootstrap/
    system_inode = get_dir(root, 'system')
    lib64_inode = get_dir(system_inode, 'lib64')
    bootstrap_inode = get_dir(lib64_inode, 'bootstrap')

    if bootstrap_inode:
        print("Found /system/lib64/bootstrap/")
        for entry, filetype in bootstrap_inode.opendir():
            name = entry.name
            if isinstance(name, bytes):
                name = name.decode('utf-8', errors='replace')
            if name in ('.', '..'):
                continue
            inode = vol.inodes[entry.inode]
            if inode.size > 1000:  # Skip stubs
                extract_file(inode, f'/tmp/bionic/{name}')

    # Also try to get linker64 from APEX
    apex_inode = get_dir(system_inode, 'apex')
    if apex_inode:
        for entry, filetype in apex_inode.opendir():
            name = entry.name
            if isinstance(name, bytes):
                name = name.decode('utf-8', errors='replace')
            if 'runtime' in name:
                print(f"Found APEX: {name}")
                inode = vol.inodes[entry.inode]
                extract_file(inode, f'/tmp/runtime.apex')
                break
PYEOF

            # If we got the APEX, extract linker64 from it
            if [ -f /tmp/runtime.apex ]; then
              echo "Extracting linker64 from APEX..."
              cd /tmp
              rm -rf apex_dir/
              unzip -q runtime.apex -d apex_dir/ 2>/dev/null

              if [ -f apex_dir/apex_payload.img ]; then
                # Use Python ext4 to read the APEX payload
                python3 << 'PYEOF2'
from ext4 import Volume
import os

with open('/tmp/apex_dir/apex_payload.img', 'rb') as f:
    vol = Volume(f)
    root = vol.root

    def get_dir(parent, name):
        for entry, filetype in parent.opendir():
            n = entry.name
            if isinstance(n, bytes):
                n = n.decode('utf-8', errors='replace')
            if n == name:
                return vol.inodes[entry.inode]
        return None

    # Extract linker64 from /bin/
    bin_inode = get_dir(root, 'bin')
    if bin_inode:
        for entry, filetype in bin_inode.opendir():
            name = entry.name
            if isinstance(name, bytes):
                name = name.decode('utf-8', errors='replace')
            if 'linker64' in name:
                inode = vol.inodes[entry.inode]
                bio = inode.open()
                data = bio.read(inode.size)
                with open('/tmp/linker64', 'wb') as out:
                    out.write(data)
                print(f"Extracted linker64: {len(data)} bytes")
                break

    # Also extract Bionic libs from /lib64/bionic/
    lib64_inode = get_dir(root, 'lib64')
    if lib64_inode:
        bionic_inode = get_dir(lib64_inode, 'bionic')
        if bionic_inode:
            for entry, filetype in bionic_inode.opendir():
                name = entry.name
                if isinstance(name, bytes):
                    name = name.decode('utf-8', errors='replace')
                if name in ('.', '..'):
                    continue
                inode = vol.inodes[entry.inode]
                if inode.size > 1000:
                    bio = inode.open()
                    data = bio.read(inode.size)
                    with open(f'/tmp/bionic/{name}', 'wb') as out:
                        out.write(data)
                    print(f"Extracted Bionic lib: {name} ({len(data)} bytes)")
PYEOF2
              fi
              cd -
            fi

            # Copy extracted Bionic libs to /system
            if [ -f /tmp/linker64 ]; then
              sudo cp /tmp/linker64 /system/bin/linker64
              sudo chmod +x /system/bin/linker64
              echo "✓ linker64 installed ($(stat -c%s /tmp/linker64) bytes)"
              file /system/bin/linker64
            fi

            if [ -d /tmp/bionic ]; then
              for lib in /tmp/bionic/*.so; do
                if [ -f "$lib" ] && [ $(stat -c%s "$lib") -gt 1000 ]; then
                  sudo cp "$lib" /system/lib64/ 2>/dev/null
                  echo "✓ $(basename $lib) ($(stat -c%s "$lib") bytes)"
                fi
              done
            fi
          fi
          
          # Also look for libc.so and other Bionic libs
          for lib in libc.so libm.so libdl.so liblog.so libdl_android.so; do
            FOUND=$(find ndk_extracted/ -name "$lib" -path "*/aarch64*" -type f 2>/dev/null | while read f; do
              SIZE=$(stat -c%s "$f")
              if [ "$SIZE" -gt 1000 ]; then
                echo "$f"
                break
              fi
            done)
            if [ -n "$FOUND" ]; then
              sudo cp "$FOUND" /system/lib64/ 2>/dev/null
              echo "  ✓ $lib ($(stat -c%s "$FOUND") bytes)"
            fi
          done
          
          cd -
          
          # Verify
          echo ""
          echo "=== Bionic setup verification ==="
          ls -la /system/bin/linker64 2>&1
          file /system/bin/linker64 2>&1
          ls -la /system/lib64/ 2>&1
          
          exit 0

      # ── Step 2: Set up Termux rootfs ──────────────────────────────
      - name: Extract Termux bootstrap
        run: |
          mkdir -p rootfs/data/data/com.termux/files/usr
          unzip -q app/src/main/assets/termux-bootstrap.zip \
            -d rootfs/data/data/com.termux/files/usr/

          # Create symlinks from SYMLINKS.txt
          cd rootfs/data/data/com.termux/files/usr
          count=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            target=$(echo "$line" | sed 's/←.*//' | sed 's/^\.\///')
            linkname=$(echo "$line" | sed 's/.*←//' | sed 's/^\.\///')
            dir=$(dirname "$linkname")
            mkdir -p "$dir"
            ln -sf "$target" "$linkname" 2>/dev/null && count=$((count+1)) || true
          done < SYMLINKS.txt
          echo "Created $count symlinks"
          cd -

          # Create necessary directories
          mkdir -p rootfs/data/data/com.termux/files/home
          mkdir -p rootfs/data/data/com.termux/files/usr/tmp
          mkdir -p rootfs/data/data/com.termux/cache/apt/archives/partial
          mkdir -p rootfs/etc
          echo "nameserver 8.8.8.8" > rootfs/etc/resolv.conf

          # apt sources.list
          mkdir -p rootfs/data/data/com.termux/files/usr/etc/apt
          echo "deb https://packages.termux.dev/apt/termux-main/ stable main" \
            > rootfs/data/data/com.termux/files/usr/etc/apt/sources.list

          # Verify
          echo "=== Rootfs verification ==="
          ls -la rootfs/data/data/com.termux/files/usr/bin/sh
          ls -la rootfs/data/data/com.termux/files/usr/bin/bash
          ls -la rootfs/data/data/com.termux/files/usr/bin/apt

      # ── Step 3: Test the full pipeline ────────────────────────────
      - name: Test 1 - Basic PRoot execution
        run: |
          chmod +x app/src/main/jniLibs/arm64-v8a/libproot.so
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          echo "=== Test: echo hello via PRoot ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c "echo 'Hello from PRoot on ARM64!'"
          echo "EXIT=$?"

      - name: Test 2 - dpkg --configure -a
        run: |
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c "dpkg --configure -a 2>&1 || true"
          echo "EXIT=$?"

      - name: Test 3 - apt update
        run: |
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "apt update -o APT::Sandbox::User=root 2>&1"
          echo "EXIT=$?"

      - name: Test 4 - apt install nodejs git python3
        run: |
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "apt install -y -o APT::Sandbox::User=root nodejs git python3 2>&1"
          echo "EXIT=$?"

          # Verify tools installed
          echo "=== Tool verification ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "node --version && npm --version && git --version"

      - name: Test 5 - npm install -g @gitlawb/openclaude
        run: |
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "npm install -g @gitlawb/openclaude 2>&1"
          echo "EXIT=$?"

      - name: Test 6 - Agent entry point resolution
        run: |
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          echo "=== Check if openclaude binary exists ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "which openclaude 2>/dev/null || echo 'NOT IN PATH'"

          echo "=== Try executing openclaude directly ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "openclaude --version 2>&1 || echo 'EXEC FAILED (shebang issue?)'"

          echo "=== Resolve symlink ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "readlink -f \$PREFIX/bin/openclaude 2>/dev/null || echo 'SYMLINK FAILED'"

          echo "=== Try node with resolved path ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            "RESOLVED=\$(readlink -f \$PREFIX/bin/openclaude) && node \"\$RESOLVED\" --version 2>&1 || echo 'NODE EXEC FAILED'"

      - name: Test 7 - Agent prompt execution
        run: |
          PROOT="$PWD/app/src/main/jniLibs/arm64-v8a/libproot.so"
          export PROOT_LOADER="$PWD/app/src/main/jniLibs/arm64-v8a/libproot_loader.so"

          echo "=== Send test prompt to agent via stdin ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            'echo "hi" | openclaude 2>&1; echo "EXIT=$?"'

          echo ""
          echo "=== Try node with resolved path + stdin ==="
          $PROOT --kill-on-exit \
            -r rootfs \
            -b /dev -b /proc -b /sys \
            -b /system -b /system/bin -b /system/lib64 \
            -b /data/local/tmp:/tmp \
            -w /data/data/com.termux/files/home \
            /data/data/com.termux/files/usr/bin/sh -c \
            'RESOLVED=$(readlink -f $PREFIX/bin/openclaude) && echo "hi" | node "$RESOLVED" 2>&1; echo "EXIT=$?"'

      - name: Summary
        if: always()
        run: |
          echo "========================================="
          echo "ARM64 Pipeline Test Summary"
          echo "========================================="
          echo "Architecture: $(uname -m)"
          echo ""
          echo "If any test above shows EXIT=0, that step passed."
          echo "If tests failed, check the logs above for the exact error."
          echo "The most common failure point is Test 1 (basic PRoot exec)"
          echo "which means the Bionic linker setup failed."
          echo "========================================="
