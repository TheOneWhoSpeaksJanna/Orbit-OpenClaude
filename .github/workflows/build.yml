name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install Android SDK components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

    - name: Build with Gradle
      run: ./gradlew assembleDebug --parallel --build-cache

    - name: Rename APK
      run: |
        mkdir -p release
        cp app/build/outputs/apk/debug/app-debug.apk release/orbit-ai-debug-${{ github.run_number }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/debug/*.apk release/orbit-ai-debug-${{ github.run_number }}.apk 2>/dev/null || \
          echo "APK not found at expected path"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: orbit-ai-debug-${{ github.run_number }}
        path: release/orbit-ai-debug-${{ github.run_number }}.apk

    - name: Determine tag name
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "name=Orbit AI ${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=Orbit AI Build #${{ github.run_number }}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: ${{ steps.tag.outputs.name }}
        files: release/orbit-ai-debug-${{ github.run_number }}.apk
